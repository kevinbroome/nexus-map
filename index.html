<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Nexus Map</title>
  </head>

  <body>
    <main id="app">
      <aside id="sidebar">
        <h1>Nexus Map</h1>
        <p id="selected-location">No location selected</p>
        <p id="status-message"></p>

        <section id="recovery-panel" hidden>
          <p id="recovery-message">
            The saved world could not be loaded. You can replace it with a fresh
            world. This cannot be undone.
          </p>
          <button id="create-new-world" type="button">Create new world</button>
        </section>

        <fieldset id="selection-modes">
          <legend>Selection mode</legend>
          <label>
            <input
              type="radio"
              name="selection-mode"
              value="single"
              checked
            />
            Single tile
          </label>
          <label>
            <input type="radio" name="selection-mode" value="adjacent" />
            Adjacent tiles
          </label>
          <label>
            <input type="radio" name="selection-mode" value="rectangle" />
            Rectangle
          </label>
        </fieldset>

        <div class="sidebar-actions">
          <button id="draw-card" type="button">Draw card</button>
        </div>

        <details id="dev-tools" class="dev-tools-accordion">
          <summary>Developer tools</summary>
          <div class="dev-actions">
            <button id="dev-expand-tile" type="button">
              Create adjacent tile (dev)
            </button>
            <button id="export-world" type="button">Export JSON</button>
            <button id="import-world" type="button">Import JSON</button>
            <input
              id="import-input"
              type="file"
              accept="application/json,.json"
              hidden
            />
          </div>
          <div id="dev-inspection" class="dev-inspection">
            <p id="dev-inspection-cardinal">Cardinal neighbours: —</p>
            <p id="dev-inspection-all">All neighbours: —</p>
            <p id="dev-inspection-region">Connected terrain region: —</p>
            <p id="dev-inspection-settlement">Settlement cluster: —</p>
          </div>
        </details>

        <section id="card-panel" hidden>
          <h2 id="card-name"></h2>
          <p id="card-description"></p>
          <p id="card-validation"></p>
          <div class="card-actions">
            <button id="apply-card" type="button" disabled>Apply</button>
            <button id="discard-card" type="button">Discard</button>
          </div>
        </section>
      </aside>

      <div id="map"></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
